<!doctype html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" id="meta-theme" content="#0a1420">
<meta name="color-scheme" content="dark light">
<title>Mundial 2026 · World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Extra+Condensed:wght@600;700;800&family=Saira:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --night:#0a1420;
  --panel:#101f2d;
  --panel-2:#0c1824;
  --line:#21384c;
  --line-soft:#192b3c;
  --inp:#081019;
  --gold:#e4b54a;
  --gold-deep:#b8842a;
  --celeste:#7cc0e8;
  --azul:#1d4ea0;
  --azul-2:#2a63c4;
  --red:#d6452f;
  --red-2:#e05540;
  --chalk:#edf3ec;
  --muted:#8da2b5;
  --ok:#6fcf8e;
  --glow:#14283a;
  --plate:#f7f3e8;
  font-size:17px;
}
html[data-theme="light"]{
  color-scheme:light;
  --night:#75aadb;
  --panel:#ffffff;
  --panel-2:#eef5fb;
  --line:#b9d2e6;
  --line-soft:#d9e7f2;
  --inp:#ffffff;
  --gold:#9a7100;
  --gold-deep:#7a5a00;
  --celeste:#25679f;
  --azul:#1d4ea0;
  --azul-2:#2a63c4;
  --red:#c0392b;
  --red-2:#cf4537;
  --chalk:#122337;
  --muted:#4a6378;
  --ok:#1d7a3e;
  --glow:#9cc6ea;
  --plate:#f7f3e8;
}
/* modo claro albiceleste: fondo celeste bandera, paneles blancos, dorado = el sol */
html[data-theme="light"] .arg-row td,
html[data-theme="light"] tr.arg-row td{background:rgba(117,170,219,.16)}
html[data-theme="light"] .kcard.final-card{box-shadow:0 0 24px rgba(154,113,0,.1)}
html[data-theme="light"] .ko-help,
html[data-theme="light"] .legend,
html[data-theme="light"] .scroll-hint,
html[data-theme="light"] .ko-help b,
html[data-theme="light"] footer{color:#10283d}
html[data-theme="light"] .sub{color:#33536d}
html[data-theme="light"] .progress{background:rgba(255,255,255,.55)}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--night)}
body{
  background-color:var(--night);
  background:
    radial-gradient(1200px 500px at 50% -200px, var(--glow) 0%, transparent 70%),
    var(--night);
  color:var(--chalk);
  font-family:"Saira",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-variant-numeric:tabular-nums;
  line-height:1.45;
}

/* ---------- header ---------- */
header{
  position:relative;
  border-bottom:1px solid var(--line);
  padding:26px 20px 0;
  background:
    repeating-linear-gradient(90deg, rgba(117,170,219,.055) 0 70px, transparent 70px 140px),
    linear-gradient(180deg, rgba(228,181,74,.07), transparent 60%);
}
html[data-theme="light"] header{
  background:
    radial-gradient(440px 230px at 86% -30px, rgba(244,200,72,.45), transparent 70%),
    repeating-linear-gradient(90deg, rgba(117,170,219,.15) 0 70px, transparent 70px 140px),
    linear-gradient(180deg, rgba(117,170,219,.2), transparent 75%),
    #ffffff;
  border-bottom:3px solid var(--gold);
}
html[data-theme="light"] h1 .thin{color:#5a8cb8}
html[data-theme="light"] .tab.active{color:var(--gold-deep);border-bottom-color:var(--gold-deep)}
html[data-theme="light"] .tab.arg.active{color:var(--celeste);border-bottom-color:var(--celeste)}
.head-inner{max-width:1280px;margin:0 auto}
.kicker{
  font-family:"Saira Extra Condensed";
  letter-spacing:.32em;text-transform:uppercase;
  font-size:.84rem;color:var(--gold);font-weight:700;
  padding-right:104px;
}
.hstars{font-size:.92rem;letter-spacing:.3em;margin:6px 0 -4px 2px}
.sunwrap{display:inline-block;vertical-align:-7px;margin-right:12px}
.sunwrap img{width:.88em;height:.88em;border-radius:50%;box-shadow:0 2px 10px rgba(117,170,219,.45)}
.col-divide{border-top:2px dashed var(--line);margin:24px 6px 6px}
.cup{display:inline-block}
.cupsvg{width:86px;height:auto;filter:drop-shadow(0 5px 16px rgba(228,181,74,.45))}
.cupimg{width:74px;height:auto;display:block;margin:0 auto;filter:drop-shadow(0 6px 18px rgba(228,181,74,.5))}
h1{
  font-family:"Saira Extra Condensed";font-weight:800;text-transform:uppercase;
  font-size:clamp(2.4rem, 6vw, 4.2rem);line-height:.95;margin:.1em 0 .15em;
}
h1 .thin{color:var(--muted);font-weight:600}
.sub{color:var(--muted);font-size:.95rem;margin:0 0 14px}
.sub b{color:var(--chalk);font-weight:600}

.progress-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.progress{flex:1;min-width:220px;height:10px;border-radius:99px;background:var(--panel);border:1px solid var(--line);overflow:hidden}
.progress i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));transition:width .4s ease}
.progress-label{font-size:.85rem;color:var(--muted);white-space:nowrap}
.progress-label b{color:var(--gold);font-weight:700}

.toolbar{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  font-family:inherit;font-size:.8rem;font-weight:600;color:var(--chalk);
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:7px 14px;cursor:pointer;
}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.btn.lang,.btn.theme{border-color:var(--celeste);color:var(--celeste)}
.btn.lang:hover,.btn.theme:hover{background:rgba(117,170,219,.12)}
.btn:focus-visible,.tab:focus-visible,input:focus-visible,select:focus-visible,
.pen-btn:focus-visible,.ficha-btn:focus-visible,.star-btn:focus-visible,
.flag-btn:focus-visible,.lang-switch button:focus-visible{outline:2px solid var(--celeste);outline-offset:2px}

/* ---------- EN / ES switch (top right) ---------- */
.lang-switch{
  position:absolute;top:16px;right:20px;z-index:6;
  display:flex;border:1px solid var(--celeste);border-radius:9px;overflow:hidden;
  background:var(--panel);
}
.lang-switch button{
  font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.08em;
  padding:6px 13px;background:none;border:none;color:var(--muted);cursor:pointer;
}
.lang-switch button.on{background:var(--celeste);color:var(--night)}
html[data-theme="light"] .lang-switch button.on{color:#fff}
.lang-switch button:not(.on):hover{color:var(--celeste)}

/* ---------- banderas clickeables + panel de equipo ---------- */
.flag-btn{cursor:pointer;display:inline-block;border-radius:5px;padding:0 1px;transition:transform .12s ease}
.flag-btn:hover{transform:scale(1.3)}
.pop-back[hidden]{display:none}
.pop-back{
  position:fixed;inset:0;z-index:50;background:rgba(4,10,16,.55);
  display:flex;align-items:center;justify-content:center;padding:18px;
  backdrop-filter:blur(2px);
}
.pop{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  width:min(440px,100%);max-height:82vh;overflow-y:auto;position:relative;
  box-shadow:0 18px 50px rgba(0,0,0,.4);padding:16px 16px 12px;
}
.pop-x{
  position:absolute;top:10px;right:10px;background:none;border:1px solid var(--line);
  border-radius:8px;color:var(--muted);font-size:.85rem;width:30px;height:30px;cursor:pointer;
}
.pop-x:hover{color:var(--red);border-color:var(--red)}
.pop-head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.pop-flag{font-size:2.4rem;line-height:1}
.pop-name{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.6rem;
  text-transform:uppercase;letter-spacing:.04em;line-height:1;
}
.pop-tot{font-size:.78rem;color:var(--muted);margin-top:3px}
.pop-tot b{color:var(--gold);font-weight:700}
.pop-sub{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:12px 0 4px}
.pop-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  padding:8px 2px;border-bottom:1px dashed var(--line-soft);font-size:.92rem;
}
.pop-row:last-child{border-bottom:none}
.pop-row .ptag{
  font-family:"Saira Extra Condensed";font-weight:700;font-size:.85rem;letter-spacing:.05em;
  color:var(--muted);text-transform:uppercase;min-width:74px;
}
.pop-row .pres{font-weight:700;white-space:nowrap}
.pop-row .pres.w{color:var(--ok)}
.pop-row .pres.d{color:var(--gold)}
.pop-row .pres.l{color:var(--red-2)}
.pop-empty{font-size:.82rem;color:var(--muted);padding:8px 2px 4px}

.tabs{display:flex;gap:4px;margin-top:18px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:"Saira Extra Condensed";font-size:1.15rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:10px 18px 12px;border-bottom:3px solid transparent;
}
.tab:hover{color:var(--chalk)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab.arg.active{color:var(--celeste);border-bottom-color:var(--celeste)}

main{max-width:1280px;margin:0 auto;padding:24px 20px 80px}
main.wide{max-width:none}

/* ---------- grupos ---------- */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;max-width:1240px;margin:0 auto;align-items:start}
.groups-bar{max-width:1240px;margin:0 auto 12px;display:flex;justify-content:flex-end}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.gcard h2{
  margin:0;padding:10px 16px;
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.4rem;
  letter-spacing:.08em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px solid var(--line-soft);background:var(--panel-2);
  cursor:pointer;user-select:none;
}
.gcard h2:hover{color:var(--gold)}
.gcard h2 .gcaret{font-size:.85rem;color:var(--muted);margin-right:9px}
.gcard.closed h2{border-bottom:none}
.gcard h2 .gmini{font-size:.78rem;font-family:"Saira";font-weight:600;letter-spacing:.02em;color:var(--muted);text-transform:none;white-space:nowrap}
.gmini .gflag{font-size:1.7rem;margin-left:6px;display:inline-block;line-height:1;padding:2px 3px;border-radius:7px}
.gmini .gflag.lead{box-shadow:0 0 0 2px var(--gold);background:rgba(228,181,74,.12)}
.gmini .gdone{margin-left:6px}
.qbadge{color:var(--ok);font-weight:800;font-size:.78rem;margin-left:4px}
/* el grupo de la Selección, vestido de bandera */
.gcard.arg-g{border-color:var(--celeste);position:relative;overflow:hidden}
.gcard.arg-g.closed{
  background:linear-gradient(180deg, #74acdf 0 32%, #ffffff 32% 68%, #74acdf 68% 100%);
}
/* el h2 pinta la tarjeta plegada: acá tiene que ser transparente para que se vea la bandera */
.gcard.arg-g.closed h2{background:transparent;color:#1d2c3e}
.gcard.arg-g.closed h2:hover{color:var(--gold-deep)}
.gcard.arg-g.closed h2 .gcaret{color:#33475c}
.gcard.arg-g.closed h2 .gmini{color:#33475c}
.gcard.arg-g.closed h2 .gdone{color:#1d7a3e}
.gcard.arg-g:not(.closed)::before{
  content:"";position:absolute;top:0;left:0;right:0;height:9px;
  background:linear-gradient(180deg, #74acdf 0 33%, #ffffff 33% 67%, #74acdf 67% 100%);
}
.gcard h2 .gdone{font-size:.72rem;font-family:"Saira";font-weight:600;letter-spacing:.04em;color:var(--ok)}
table.standings{width:100%;border-collapse:collapse;font-size:.84rem}
table.standings th{
  font-weight:600;color:var(--muted);text-align:right;padding:7px 3px;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;
  border-bottom:1px solid var(--line-soft);
}
table.standings th:first-child{text-align:left;padding-left:14px}
table.standings td{padding:5px 3px;text-align:right;border-bottom:1px solid var(--line-soft)}
table.standings td.num{color:var(--muted);font-size:.7rem;padding-left:14px;width:16px}
table.standings td.team{text-align:left;padding-left:8px;white-space:nowrap;max-width:0;width:99%;overflow:hidden;text-overflow:ellipsis}
table.standings td.pts{color:var(--gold);font-weight:700}
.standings-scroll{overflow-x:auto}
td.form{white-space:nowrap}
.fdot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:3px;background:var(--line)}
.fdot.w{background:var(--ok)}
.fdot.l{background:var(--red-2)}
.fdot.d{background:var(--muted);opacity:.6}

/* ---------- chips de tarjetas: tocá +1, mantené apretado −1 ---------- */
.mcards,.kcards{display:flex;justify-content:space-between;gap:6px}
.mcards{grid-column:1/-1;margin-top:1px}
.kcards{margin-top:5px;padding-top:5px;border-top:1px dashed var(--line-soft)}
.chipset{display:flex;gap:4px}
.card-chip{
  font-family:inherit;font-size:.8rem;font-weight:700;color:var(--chalk);
  background:none;border:1px solid transparent;border-radius:7px;
  padding:2px 7px;cursor:pointer;line-height:1.3;user-select:none;
  -webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;
}
.card-chip:hover{border-color:var(--line)}
.card-chip.off{opacity:.3}
.card-chip.off:hover{opacity:.7}
.card-chip .cx{margin-left:7px;color:var(--muted);font-weight:800;padding:0 3px;border-left:1px solid var(--line-soft)}
.card-chip .cx:hover{color:var(--red)}

/* ---------- parte médico ---------- */
.inj-pad{padding:10px 16px 14px}
.inj-row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line-soft)}
.inj-row:last-of-type{border-bottom:none;margin-bottom:8px}
.inj-row .iname{font-weight:600;white-space:nowrap;font-size:.85rem}
.inj-row .iname b{color:var(--gold)}
.inj-row input{
  font-family:inherit;font-size:.78rem;color:var(--chalk);
  background:var(--inp);border:1px solid var(--line);border-radius:7px;padding:6px 8px;min-width:0;
}
.inj-x{
  background:none;border:1px solid var(--line);border-radius:7px;
  color:var(--muted);width:28px;height:28px;cursor:pointer;font-size:.8rem;
}
.inj-x:hover{color:var(--red);border-color:var(--red)}
.inj-none{font-size:.84rem;color:var(--ok);padding:4px 0 10px}
table.squad tr.inj td{opacity:.45}
table.squad tr.inj td.p{text-decoration:line-through}

/* ---------- plantel con camisetas ---------- */
.squad-sec{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.1rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--celeste);
  padding:14px 16px 2px;
}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(106px,1fr));gap:10px;padding:10px 16px 14px}
.pcard{
  background:var(--panel-2);border:1px solid var(--line-soft);border-radius:12px;
  padding:10px 6px 9px;text-align:center;
}
.pcard .jsvg{width:54px;height:60px;display:block;margin:0 auto}
.pcard .pname{font-size:.73rem;font-weight:600;line-height:1.2;margin-top:5px;min-height:2.4em;display:flex;align-items:center;justify-content:center}
.pcard .pbadges{font-size:.72rem;color:var(--gold);font-weight:700;margin-top:2px;min-height:1.1em;letter-spacing:.03em}
.pcard.injp{opacity:.42}
.pcard.injp .pname{text-decoration:line-through}

/* ---------- ¿quién juega hoy? ---------- */
.today{
  display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto;
  scrollbar-width:none;margin-top:12px;padding:2px 0 4px;
}
.today::-webkit-scrollbar{display:none}
.today .tlabel{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1rem;
  letter-spacing:.08em;text-transform:uppercase;color:var(--gold);white-space:nowrap;
}
.tchip{
  font-family:inherit;font-size:.86rem;font-weight:600;color:var(--chalk);
  background:var(--panel);border:1px solid var(--line);border-radius:99px;
  padding:5px 13px;cursor:pointer;white-space:nowrap;
}
.tchip:hover{border-color:var(--gold)}
.tchip .tsc{color:var(--gold);font-weight:700}
.tchip .tmeta{color:var(--muted);font-weight:500}
@keyframes flashbg{0%,60%{box-shadow:0 0 0 3px var(--gold)}100%{box-shadow:0 0 0 0 transparent}}
.flash{animation:flashbg 1.8s ease}
.ft-chip{
  font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;
  color:var(--muted);background:var(--panel-2);border:1px solid var(--line);
  border-radius:99px;padding:3px 10px;margin-right:8px;
}
.ft-chip.on{color:#10131a;background:var(--gold);border-color:var(--gold)}

/* goleadores como chips: tocá +1 · mantené apretado −1 */
.gchips{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 6px}
.gchip{
  font-family:inherit;font-size:.74rem;font-weight:600;color:var(--chalk);
  background:var(--panel);border:1px solid var(--line);border-radius:99px;
  padding:3px 11px;cursor:pointer;line-height:1.4;user-select:none;
  -webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;
}
.gchip b{color:var(--gold);font-weight:700}
.gchip .gx{margin-left:8px;color:var(--muted);font-weight:700;padding:2px}
.gchip:hover{border-color:var(--gold)}
.gchip .gx:hover{color:var(--red)}
.lb-val{display:inline-flex;gap:9px}
select.sq{
  width:100%;font-family:inherit;font-size:.78rem;color:var(--chalk);
  background:var(--inp);border:1px solid var(--line);border-radius:8px;
  padding:7px 8px;margin-bottom:6px;
}

/* ---------- leaderboards de estadísticas ---------- */
.lb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.lb{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.lb.arg-lb{border-color:var(--celeste);box-shadow:0 0 0 1px rgba(117,170,219,.25) inset}
.gk-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.gk-row .gk-left{flex:1 1 360px;min-width:300px}
.plantel-top{flex:0 1 410px;margin-left:auto;padding:46px 16px 0}
.plantel-top .lb{width:100%;max-width:410px}
.lb-empty{font-size:.85rem;color:var(--muted);padding:8px 2px}
.argbar{background:linear-gradient(90deg,#75aadb,#a8cdf0) !important}
.lb-t{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.15rem;
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;
}
.lb-t small{font-family:"Saira";font-size:.66rem;font-weight:500;color:var(--muted);letter-spacing:.02em;text-transform:none}
.lb-row{display:grid;grid-template-columns:20px minmax(118px,auto) 1fr auto;gap:9px;align-items:center;padding:6px 0;font-size:.92rem}
.lb-row.arg .lb-team{color:var(--celeste);font-weight:600}
.lb-rank{color:var(--muted);font-size:.72rem;font-weight:600}
.lb-team{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bar{height:7px;border-radius:99px;background:var(--panel-2);border:1px solid var(--line-soft);overflow:hidden;display:flex}
.lb-bar.balls{height:auto;background:none;border:none;overflow:visible;font-size:.92rem;letter-spacing:3px;line-height:1}
.lb-bar i{display:block;height:100%}
.lb-bar i:first-child{border-radius:99px 0 0 99px}
.lb-bar i:last-child{border-radius:0 99px 99px 0}
.lb-bar i:only-child{border-radius:99px}
.lb-bar i.atk{background:var(--celeste)}
.lb-bar i.def{background:var(--ok)}
.lb-bar i.disy{background:#e8c321}
.lb-bar i.disr{background:var(--red-2)}
.lb-val{font-weight:700;color:var(--gold);font-size:.9rem;white-space:nowrap}
.lb-empty{font-size:.8rem;color:var(--muted);padding:4px 0}

details.tbl-details summary{
  cursor:pointer;list-style:none;padding:12px 16px;
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.3rem;
  letter-spacing:.08em;text-transform:uppercase;background:var(--panel-2);
  display:flex;align-items:center;gap:10px;
}
details.tbl-details summary::-webkit-details-marker{display:none}
details.tbl-details summary::before{content:"▸";font-size:.9rem;color:var(--muted);transition:transform .15s}
details.tbl-details[open] summary::before{transform:rotate(90deg)}
details.tbl-details summary small{font-family:"Saira";font-size:.7rem;font-weight:500;color:var(--muted);letter-spacing:.02em;text-transform:none}
.scard.awards-card{border-color:var(--gold-deep)}
tr.q1 td:first-child{box-shadow:inset 4px 0 0 var(--gold)}
tr.q3 td:first-child{box-shadow:inset 4px 0 0 var(--celeste)}
tr.arg-row td{background:rgba(117,170,219,.10)}
table.standings th:last-child, table.standings td:last-child{padding-right:14px}

.gmatches{padding:8px 12px 12px}
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px dashed var(--line-soft)}
.mrow:last-child{border-bottom:none}
.mteam{font-size:.96rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mteam.away{text-align:right}
.mmeta{grid-column:1/-1;font-size:.75rem;color:var(--muted);letter-spacing:.04em;margin-top:-2px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.scorebox{display:flex;align-items:center;gap:4px}
input.score{
  width:44px;height:38px;text-align:center;
  font-family:"Saira";font-weight:700;font-size:1.15rem;
  color:var(--gold);background:var(--inp);
  border:1px solid var(--line);border-radius:8px;
  -moz-appearance:textfield;appearance:textfield;
}
input.score::-webkit-outer-spin-button,input.score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.score:focus{border-color:var(--gold)}
input.score::placeholder{color:var(--muted);opacity:.45;font-weight:400}
.dash{color:var(--muted)}

/* ---------- ficha del partido ---------- */
.ficha-btn{
  font-family:inherit;font-size:.74rem;font-weight:600;letter-spacing:.04em;
  color:var(--muted);background:none;border:1px solid var(--line);
  border-radius:6px;padding:2px 8px;cursor:pointer;white-space:nowrap;
}
.ficha-btn:hover{color:var(--celeste);border-color:var(--celeste)}
.ficha-btn.has{color:var(--celeste);border-color:var(--celeste)}
.ficha{grid-column:1/-1;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:10px;padding:10px;margin-top:6px;font-size:.78rem}
.ficha .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ficha .fside{min-width:0}
.ficha .fteam{font-size:.72rem;font-weight:700;color:var(--celeste);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ficha input[type=text]{
  width:100%;font-family:inherit;font-size:.76rem;color:var(--chalk);
  background:var(--inp);border:1px solid var(--line);border-radius:7px;padding:6px 8px;margin-bottom:6px;
}
.ficha input[type=text]::placeholder{color:var(--muted);opacity:.6}
.cardrow{display:flex;align-items:center;gap:6px}
.cardrow label{display:flex;align-items:center;gap:3px;color:var(--muted);font-size:.72rem}
input.cnum{
  width:42px;height:30px;text-align:center;font-family:inherit;font-weight:700;
  color:var(--chalk);background:var(--inp);border:1px solid var(--line);border-radius:7px;
  -moz-appearance:textfield;appearance:textfield;
}
input.cnum::-webkit-outer-spin-button,input.cnum::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.fwide{margin-top:8px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.stars{display:flex;gap:2px}
.star-btn{background:none;border:none;cursor:pointer;font-size:1.05rem;color:var(--line);padding:0 1px}
.star-btn.on{color:var(--gold)}

/* ---------- eliminatorias: cuadro estilo póster ---------- */
.elim-top{max-width:1240px;margin:0 auto}
.ko-bar{display:flex;align-items:center;gap:10px;margin:0 0 14px;flex-wrap:wrap}
.ko-toggle{display:flex;border:1px solid var(--celeste);border-radius:9px;overflow:hidden;background:var(--panel)}
.ko-toggle button{
  font-family:inherit;font-size:.8rem;font-weight:700;letter-spacing:.04em;
  padding:7px 16px;background:none;border:none;color:var(--muted);cursor:pointer;
}
.ko-toggle button.on{background:var(--celeste);color:var(--night)}
html[data-theme="light"] .ko-toggle button.on{color:#fff}
.ko-toggle button:not(.on):hover{color:var(--celeste)}

/* vista por ronda: lista vertical, se lee de arriba a abajo */
.ko-list{max-width:1240px;margin:0 auto}
.round-banner.list-b{margin:20px 0 10px;max-width:460px}
.round-banner.list-b:first-child{margin-top:0}
.round-banner .bcount{
  font-family:"Saira";font-size:.72rem;font-weight:700;letter-spacing:.03em;
  background:rgba(255,255,255,.22);border-radius:99px;padding:2px 9px;margin-left:4px;
}
.ko-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.ko-cards .kcard{margin:0}
.champion.list-ch{max-width:460px}

/* modo ajustar: el cuadro entero escalado para verlo de un vistazo */
.bracket.fitted{cursor:zoom-in}
.bracket.fitted *{pointer-events:none}

.ko-help{font-size:.85rem;color:var(--muted);max-width:780px;margin:0 0 14px}
.ko-help b{color:var(--chalk)}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:.75rem;color:var(--muted);margin-bottom:18px}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:14px;height:4px;border-radius:2px;display:inline-block}
.legend .l-gold{background:var(--gold)}
.legend .l-celeste{background:var(--celeste)}
.legend .l-path{background:var(--gold);box-shadow:0 0 6px rgba(228,181,74,.8)}

.thirds-panel{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin:0 0 22px;max-width:560px;
}
.thirds-panel h3{margin:0 0 2px;font-family:"Saira Extra Condensed";font-weight:800;font-size:1.15rem;letter-spacing:.08em;text-transform:uppercase;color:var(--celeste)}
.thirds-panel p{font-size:.75rem;color:var(--muted);margin:0 0 8px}
.thirds-panel table{width:100%;border-collapse:collapse;font-size:.82rem}
.thirds-panel td,.thirds-panel th{padding:4px 6px;text-align:right;border-bottom:1px solid var(--line-soft)}
.thirds-panel th{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.thirds-panel td.team,.thirds-panel th.team{text-align:left}
.thirds-panel tr.in td.team{box-shadow:inset 4px 0 0 var(--celeste)}
.thirds-panel td.pts{color:var(--gold);font-weight:700}

.scroll-hint{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:0 auto 8px;max-width:1240px}

.ko-scroll{overflow-x:auto;padding-bottom:18px;-webkit-overflow-scrolling:touch}
.bracket{
  position:relative;
  min-width:max-content;
  margin:0 auto;
  padding:8px 24px 24px;
}
#bracket-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:0}
#bracket-svg path{fill:none;stroke:var(--line);stroke-width:2}
#bracket-svg path.gold{stroke:var(--gold);stroke-width:2.5;filter:drop-shadow(0 0 4px rgba(228,181,74,.65))}

.bracket-head, .bracket-grid{
  display:grid;
  grid-template-columns:236px 236px 236px 236px 268px;
  column-gap:34px;
  position:relative;z-index:1;
}
.bracket-head{margin-bottom:10px}
.round-banner{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.15rem;
  letter-spacing:.12em;text-transform:uppercase;color:#fff;
  background:linear-gradient(180deg,var(--azul-2),var(--azul));
  border:1px solid #3a74d4;border-radius:10px;
  padding:7px 10px;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
  width:100%;cursor:default;
}
button.round-banner{cursor:pointer;user-select:none}
button.round-banner:hover{filter:brightness(1.12)}
.round-banner .caret{font-size:.7rem;opacity:.85}
.round-banner.collapsed{padding:7px 2px;letter-spacing:0}
.round-banner.collapsed .label,.round-banner.collapsed .mini{display:none}
.slot.coll{display:none}
.round-banner .mini{font-size:.85rem}
.round-banner.red{background:linear-gradient(180deg,var(--red-2),#b23420);border-color:#ec6e58}
.round-banner.green{background:linear-gradient(180deg,#2f8a55,#1f6a3e);border-color:#46a86c}
.round-banner.goldb{
  background:linear-gradient(180deg,#caa23c,#9c721f);border-color:#e9c465;
  color:#171002;text-shadow:0 1px 0 rgba(255,255,255,.25);
}
.round-banner.celeste{background:linear-gradient(180deg,#75aadb,#4e8cc6);border-color:#9cc4e8}

.bracket-grid{grid-auto-rows:minmax(56px,auto)}
.slot{display:flex;align-items:center;position:relative;z-index:1}
.slot>.kcard{width:100%}
.final-col{display:flex;flex-direction:column;justify-content:center;gap:14px}
.champ-gap{margin-top:22px}

.kcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin:5px 0}
.kcard.live-gold{border-color:var(--gold-deep)}
.kcard.final-card{
  border-color:var(--gold-deep);
  background:linear-gradient(180deg,rgba(228,181,74,.1),var(--panel));
  box-shadow:0 0 30px rgba(228,181,74,.12);
}
.knum{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;gap:6px}
.knum b{color:var(--gold);font-weight:700}
.kvenue{font-size:.71rem;color:var(--muted);letter-spacing:.05em;margin:0 0 5px}
.kteam{display:grid;grid-template-columns:1fr 46px;align-items:center;gap:8px;padding:3px 0}
.kteam .tname{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kteam .tname.tbd{color:var(--muted);font-weight:400;font-size:.84rem;font-style:italic}
.kteam.winner .tname{color:var(--gold)}
.kteam.loser .tname{opacity:.55}
.kteam input.score{width:100%;height:34px;font-size:1.05rem}
.kcard .ficha{margin-top:8px}
select.third{
  width:100%;margin:3px 0 2px;
  font-family:inherit;font-size:.78rem;color:var(--chalk);
  background:var(--inp);border:1px solid var(--line);border-radius:8px;padding:6px 8px;
}
.pen{margin-top:7px;padding-top:7px;border-top:1px dashed var(--line-soft);font-size:.7rem;color:var(--muted)}
.pen .pen-row{display:flex;gap:6px;margin-top:5px}
.pen-btn{
  flex:1;font-family:inherit;font-size:.72rem;font-weight:600;
  background:var(--panel-2);color:var(--chalk);
  border:1px solid var(--line);border-radius:7px;padding:4px 5px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pen-btn:hover{border-color:var(--gold)}
.pen-btn.sel{border-color:var(--gold);color:var(--gold);background:rgba(228,181,74,.1)}

.champion{
  border:1px solid var(--gold-deep);border-radius:14px;
  background:radial-gradient(280px 150px at 50% 0%, rgba(228,181,74,.2), transparent 70%), var(--panel);
  padding:14px;text-align:center;position:relative;overflow:hidden;
}
.champion .cplate{
  background:var(--plate);border-radius:10px;min-height:58px;
  display:flex;align-items:center;justify-content:center;
  margin:10px 4px 6px;padding:8px;border:1px solid rgba(0,0,0,.08);
}
.champion .cname{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.7rem;
  text-transform:uppercase;letter-spacing:.05em;color:#171002;
}
.champion .cname.tbd{color:#9a937f;font-size:.88rem;font-family:"Saira";font-weight:500;font-style:italic;letter-spacing:0;text-transform:none}
.champion .cup{font-size:2.2rem;display:inline-block}
.champion.won .cup{animation:lift 1s ease}
@keyframes lift{0%{transform:translateY(14px) scale(.7);opacity:0}60%{transform:translateY(-4px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.champion.won::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg, transparent 30%, rgba(255,240,200,.22) 50%, transparent 70%);
  background-size:250% 100%;
  animation:shine 2.6s ease infinite;
}
@keyframes shine{0%{background-position:120% 0}100%{background-position:-130% 0}}

/* ---------- estadísticas ---------- */
.stats-wrap{max-width:1240px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.leaders{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.leader{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;
}
.leader .ll{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.leader .lv{font-family:"Saira Extra Condensed";font-weight:800;font-size:1.25rem;margin-top:2px;line-height:1.1}
.leader .lv small{font-family:"Saira";font-size:.75rem;color:var(--gold);font-weight:700;margin-left:4px}
.scard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.scard h2{
  margin:0;padding:10px 16px;font-family:"Saira Extra Condensed";font-weight:800;font-size:1.3rem;
  letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--line-soft);background:var(--panel-2);
  display:flex;justify-content:space-between;align-items:baseline;gap:8px;
}
.scard h2 small{font-family:"Saira";font-size:.7rem;font-weight:500;color:var(--muted);letter-spacing:.02em;text-transform:none}
.scard .pad{padding:12px 16px;font-size:.85rem;color:var(--muted)}
table.stats{width:100%;border-collapse:collapse;font-size:.83rem}
table.stats th{
  font-weight:600;color:var(--muted);text-align:right;padding:7px 6px;cursor:pointer;user-select:none;
  font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line-soft);white-space:nowrap;
}
table.stats th.team{text-align:left;padding-left:16px}
table.stats th.sorted{color:var(--gold)}
table.stats td{padding:5px 6px;text-align:right;border-bottom:1px solid var(--line-soft)}
table.stats td.team{text-align:left;padding-left:16px;white-space:nowrap}
table.stats td.fp{color:var(--ok);font-weight:600}
table.stats tr:last-child td{border-bottom:none}
.awards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:12px 16px}
.award{display:flex;flex-direction:column;gap:4px}
.award label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.award input{
  font-family:inherit;font-size:.85rem;color:var(--chalk);
  background:var(--inp);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
}
.award .hint{font-size:.68rem;color:var(--gold)}

/* ---------- la scaloneta ---------- */
.arg-wrap{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.arg-hero{
  border:1px solid var(--line);border-radius:16px;overflow:hidden;
  background:
    repeating-linear-gradient(90deg, rgba(117,170,219,.16) 0 56px, transparent 56px 112px),
    var(--panel);
  padding:18px 20px;position:relative;
}
.arg-hero .stars3{font-size:1rem;letter-spacing:.18em}
.arg-hero h2{
  margin:.05em 0 .05em;font-family:"Saira Extra Condensed";font-weight:800;
  font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;line-height:.95;
}
.arg-hero h2 span{color:var(--celeste)}
.arg-hero .next{font-size:.8rem;color:var(--muted);margin-top:6px}
.arg-hero .count{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:1.6rem;color:var(--gold);letter-spacing:.04em;
}
.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{
  background:var(--panel-2);border:1px solid var(--line);border-radius:99px;
  font-size:.75rem;padding:4px 12px;color:var(--muted);
}
.chip b{color:var(--chalk);font-weight:700}
.camino .step{
  display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  padding:9px 16px;border-bottom:1px dashed var(--line-soft);font-size:.86rem;
}
.camino .step:last-child{border-bottom:none}
.camino .tag{
  font-family:"Saira Extra Condensed";font-weight:800;font-size:.95rem;letter-spacing:.06em;
  color:var(--celeste);text-transform:uppercase;min-width:86px;
}
.camino .res{font-weight:700;color:var(--gold);white-space:nowrap}
.camino .res.pending{color:var(--muted);font-weight:400;font-style:italic;font-size:.76rem}
.camino .meta{grid-column:2;font-size:.68rem;color:var(--muted);margin-top:-4px}
.routes{padding:10px 16px;font-size:.78rem;color:var(--muted)}
.routes b{color:var(--chalk)}
table.squad{width:100%;border-collapse:collapse;font-size:.83rem}
table.squad th{font-weight:600;color:var(--muted);text-align:right;padding:6px;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line-soft)}
table.squad th.p{text-align:left;padding-left:16px}
table.squad td{padding:5px 6px;text-align:right;border-bottom:1px solid var(--line-soft)}
table.squad td.p{text-align:left;padding-left:16px;white-space:nowrap}
table.squad td.num{color:var(--gold);font-weight:700;font-size:.78rem;width:24px}
table.squad td.pos{color:var(--muted);font-size:.72rem}
table.squad td.g{color:var(--gold);font-weight:700}
table.squad tr:last-child td{border-bottom:none}

@media (prefers-reduced-motion: reduce){
  .progress i{transition:none}
  .champion.won::after{animation:none;display:none}
  .champion.won .cup{animation:none}
}
footer{border-top:1px solid var(--line);color:var(--muted);font-size:.75rem;text-align:center;padding:18px}
footer .credit{display:flex;align-items:center;justify-content:center;gap:11px;margin-top:12px;font-weight:700;letter-spacing:.05em;font-size:1.05rem;color:var(--chalk)}
footer .credit img{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);display:block}
#fx{position:fixed;inset:0;z-index:95;pointer-events:none}
@media (max-width:540px){
  .bracket-head,.bracket-grid{grid-template-columns:212px 212px 212px 212px 244px}
  input.score{width:40px}
  .ficha .fgrid{grid-template-columns:1fr}
}

/* ---------- móvil: ergonomía táctil + tab bar inferior ---------- */
button,input,select,.tab,.btn,.gchip,.ft-chip,.flag-btn{touch-action:manipulation}
@media screen and (max-width:720px){
  body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  header{padding-top:calc(26px + env(safe-area-inset-top))}

  /* tabs → barra fija abajo, con espacio para notch/home bar */
  .tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:60;margin:0;
    background:var(--panel);border-top:1px solid var(--line);
    padding:4px 6px calc(6px + env(safe-area-inset-bottom));
    gap:2px;box-shadow:0 -6px 18px rgba(0,0,0,.25);
  }
  .tab{
    flex:1 1 0;min-width:0;min-height:48px;
    padding:6px 2px;font-size:.82rem;letter-spacing:.02em;
    white-space:normal;line-height:1.1;text-align:center;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    border-bottom:none;border-top:3px solid transparent;
  }
  .tab.active{border-top-color:var(--gold);border-bottom-color:transparent}
  .tab.arg.active{border-top-color:var(--celeste)}
  html[data-theme="light"] .tab.active{border-top-color:var(--gold-deep);border-bottom-color:transparent}
  html[data-theme="light"] .tab.arg.active{border-top-color:var(--celeste)}
  main{padding-bottom:calc(112px + env(safe-area-inset-bottom))}
  footer{padding-bottom:calc(96px + env(safe-area-inset-bottom))}

  /* objetivos táctiles ≥44px */
  .btn{min-height:44px;padding:10px 16px;font-size:.85rem}
  .lang-switch button{min-height:44px;padding:10px 16px}
  .ko-toggle button{min-height:44px;padding:10px 18px}
  .ft-chip{min-height:44px;padding:8px 14px;display:inline-flex;align-items:center}
  .gchip{min-height:44px;padding:8px 13px;display:inline-flex;align-items:center}
  .gchip .gx{padding:8px 4px 8px 10px}
  .pop-x{width:44px;height:44px;font-size:1rem}
  .ficha-btn,.pen-btn,.inj-add{min-height:44px}
  .inj-x{min-width:44px;min-height:44px}
  .star-btn{font-size:1.3rem;padding:6px 4px}
  input.score{width:50px;height:44px}
  .kteam{grid-template-columns:1fr 54px}
  .kteam input.score{height:42px}
  select.sq,select.third{min-height:44px}

  /* una sola columna: las tarjetas refluyen, no se encogen */
  .groups-grid{grid-template-columns:1fr}
  .ko-cards{grid-template-columns:1fr}
  .lb-grid{grid-template-columns:1fr}
}

/* ---------- impresión: PDF limpio de la pestaña visible ---------- */
@media print{
  @page{margin:11mm}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  :root, html[data-theme="dark"], html[data-theme="light"]{
    --night:#ffffff; --panel:#ffffff; --panel-2:#f3f3f1;
    --line:#b9b9b4; --line-soft:#dddDd8; --inp:#ffffff;
    --gold:#7a5a00; --gold-deep:#5e4500; --celeste:#1d5b8f;
    --chalk:#141414; --muted:#555550; --ok:#1d7a3e; --glow:transparent;
  }
  body{background:#fff !important}
  header{background:#fff !important;border-bottom:2px solid #888}
  .toolbar,.tabs,.lang-switch,.today,.ko-bar,.groups-bar,.scroll-hint,.legend,
  .ficha,.ficha-btn,.ft-chip,.inj-x,.inj-add,select.third,.pen,#fx,.pop-back,
  #bracket,#bracket-svg,.progress{display:none !important}
  #ko-list{display:block !important}
  .hero{background:#fff !important;border:1px solid #bbb}

function fichaOf(key){ return state.f[key] || null; }
function fichaVal(key, field){
  const f = fichaOf(key);
  if(!f) return (field==="st") ? 0 : "";
  if(field==="st") return f.st || 0;
  return f[field] !== undefined && f[field] !== null ? f[field] : "";
}
function setFicha(key, field, value){
  if(!state.f[key]) state.f[key] = {};
  state.f[key][field] = value;
  /* limpiar fichas vacías */
  const f = state.f[key];
  const empty = !f.sc0 && !f.sc1 && !f.mvp && !f.st &&
    !val(f.y0) && !val(f.y1) && !val(f.r0) && !val(f.r1) &&
    f.y0!==0 && f.y1!==0 && f.r0!==0 && f.r1!==0;
  if(empty && !f.sc0 && !f.sc1 && !f.mvp && !f.st) {
    const hasCard = ["y0","y1","r0","r1"].some(k=> f[k]!=="" && f[k]!==undefined && f[k]!==null);
    if(!hasCard) delete state.f[key];
  }
}
function fichaHasData(key){
  const f = fichaOf(key);
  if(!f) return false;
  return !!(f.sc0 || f.sc1 || f.mvp || f.st ||
    (f.y0!==""&&f.y0!==undefined&&f.y0!==null) || (f.y1!==""&&f.y1!==undefined&&f.y1!==null) ||
    (f.r0!==""&&f.r0!==undefined&&f.r0!==null) || (f.r1!==""&&f.r1!==undefined&&f.r1!==null));
}

/* tarjetas de un equipo en partidos de SU grupo (para fair play FIFA) */
function groupCards(g){
  const out = {};
  GROUPS[g].forEach(c => out[c] = {y:0, r:0});
  GM.forEach((m,i)=>{
    if(m[0]!==g) return;
    /* sin resultado, el partido no aporta nada a las estadísticas */
    const sc = state.g[i];
    if(!sc || val(sc[0])===null || val(sc[1])===null) return;
    const f = fichaOf("g:"+i);
    if(!f) return;
    out[m[4]].y += val(f.y0)||0; out[m[4]].r += val(f.r0)||0;
    out[m[5]].y += val(f.y1)||0; out[m[5]].r += val(f.r1)||0;
  });
  return out;
}

function groupStandings(g){
  const rows = {};
  GROUPS[g].forEach(c => rows[c] = {c, pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, dg:0, pts:0, fp:0, form:[]});
  let played = 0;
  GM.forEach((m,i)=>{
    if(m[0]!==g) return;
    const s = state.g[i];
    if(!s || val(s[0])===null || val(s[1])===null) return;
    played++;
    const h=val(s[0]), a=val(s[1]);
    const H=rows[m[4]], A=rows[m[5]];
    H.pj++; A.pj++; H.gf+=h; H.gc+=a; A.gf+=a; A.gc+=h;
    if(h>a){H.pg++;H.pts+=3;A.pp++;}
    else if(h<a){A.pg++;A.pts+=3;H.pp++;}
    else {H.pe++;A.pe++;H.pts++;A.pts++;}
    H.form.push({r: h>a?"w":h<a?"l":"d", s:h+"–"+a, o:m[5]});
    A.form.push({r: a>h?"w":a<h?"l":"d", s:a+"–"+h, o:m[4]});
  });
  const cards = groupCards(g);
  const list = Object.values(rows);
  list.forEach(r=>{ r.dg=r.gf-r.gc; r.fp = -(cards[r.c].y + 4*cards[r.c].r); });
  list.sort((x,y)=> y.pts-x.pts || y.dg-x.dg || y.gf-x.gf || y.fp-x.fp || x.c.localeCompare(y.c));
  return {list, complete: played===6};
}

function thirdsTable(){
  const out = [];
  for(const g in GROUPS){
    const st = groupStandings(g);
    if(st.complete) out.push(Object.assign({grp:g}, st.list[2]));
  }
  out.sort((x,y)=> y.pts-x.pts || y.dg-x.dg || y.gf-x.gf || y.fp-x.fp || x.grp.localeCompare(y.grp));
  return out;
}

function koTeams(m){
  function slot(s){
    if(s.t==="pos"){
      const st = groupStandings(s.g);
      if(st.complete) return { code: st.list[s.p-1].c, conf: true, label: L().pos(s.p, s.g) };
      /* grupo sin terminar: mostramos al que hoy ocupa ese puesto, como tentativo */
      const anyPlayed = st.list.some(r=>r.pj>0);
      return { code: null, proj: anyPlayed ? st.list[s.p-1].c : null, label: L().pos(s.p, s.g) };
    }
    if(s.t==="third"){
      return { code: state.third[m.id] || null, conf: !!state.third[m.id], label: L().third(s.gs) };
    }
    const prev = KO_BY_ID[s.m];
    const w = koWinner(prev);
    if(s.t==="win")  return { code: w ? w.win  : null, label: L().win(s.m) };
    return { code: w ? w.lose : null, label: L().lose(s.m) };
  }
  return { a: slot(m.a), b: slot(m.b) };
}

function koWinner(m){
  const t = koTeams(m);
  if(!t.a.code || !t.b.code) return null;
  const s = state.k[m.id];
  if(!s || val(s[0])===null || val(s[1])===null) return null;
  const h=val(s[0]), a=val(s[1]);
  if(h>a) return {win:t.a.code, lose:t.b.code};
  if(h<a) return {win:t.b.code, lose:t.a.code};
  const p = state.pen[m.id];
  if(p==="a") return {win:t.a.code, lose:t.b.code};
  if(p==="b") return {win:t.b.code, lose:t.a.code};
  return null;
}

function progress(){
  let n=0;
  GM.forEach((m,i)=>{ const s=state.g[i]; if(s && val(s[0])!==null && val(s[1])!==null) n++; });
  KO.forEach(m=>{ const s=state.k[m.id]; if(s && val(s[0])!==null && val(s[1])!==null) n++; });
  return n;
}

function teamStats(){
  const st = {};
  for(const c in T) st[c] = {c, pj:0, w:0, gf:0, gc:0, dg:0, y:0, r:0, fp:0};
  allMatches().forEach(m=>{
    const f = fichaOf(m.key);
    const scored = m.hs!==null && m.as!==null;
    if(m.home && st[m.home]){
      if(scored){
        st[m.home].pj++; st[m.home].gf+=m.hs; st[m.home].gc+=m.as;
        if(m.hs>m.as || (m.ko && koWinner(m.ko) && koWinner(m.ko).win===m.home)) st[m.home].w++;
        if(f){ st[m.home].y += val(f.y0)||0; st[m.home].r += val(f.r0)||0; }
      }
    }
    if(m.away && st[m.away]){
      if(scored){
        st[m.away].pj++; st[m.away].gf+=m.as; st[m.away].gc+=m.hs;
        if(m.as>m.hs || (m.ko && koWinner(m.ko) && koWinner(m.ko).win===m.away)) st[m.away].w++;
        if(f){ st[m.away].y += val(f.y1)||0; st[m.away].r += val(f.r1)||0; }
      }
    }
  });
  const list = Object.values(st);
  list.forEach(r=>{ r.dg = r.gf-r.gc; r.fp = -(r.y + 4*r.r); });
  return list;
}

/* "Messi x2, Julián Álvarez (3), De Paul" → [{name, n}] */
function parseScorers(str){
  if(!str) return [];
  return str.split(",").map(p=>{
    let s = p.trim();
    if(!s) return null;
    let n = 1;
    let m = s.match(/^(.*?)\s*[xX]\s*(\d+)$/);
    if(!m) m = s.match(/^(.*?)\s*\((\d+)\)$/);
    if(m){ s = m[1].trim(); n = Math.max(1, Math.min(9, Number(m[2]))); }
    return s ? {name:s, n} : null;
  }).filter(Boolean);
}

function scorersTally(){
  const tally = {};
  allMatches().forEach(m=>{
    if(m.hs===null || m.as===null) return;
    const f = fichaOf(m.key);
    if(!f) return;
    [["sc0", m.home],["sc1", m.away]].forEach(([field, team])=>{
      parseScorers(f[field]).forEach(g=>{
        const k = g.name.toLowerCase()+"|"+(team||"?");
        if(!tally[k]) tally[k] = {name:g.name, team, n:0};
        tally[k].n += g.n;
      });
    });
  });
  return Object.values(tally).sort((a,b)=> b.n-a.n || a.name.localeCompare(b.name));
}

function matchPlayer(entered, squadName){
  const a = entered.toLowerCase().trim(), b = squadName.toLowerCase();
  if(!a) return false;
  if(b===a) return true;
  if(b.includes(a) && a.length>=4) return true;
  const last = b.split(" ").slice(-1)[0];
  return a===last;
}

function argPlayerStats(){
  const rows = SQUAD_AZ.map(([name,pos,num,jn])=>({name, pos, num, jn, g:0, f:0}));
  allMatches().forEach(m=>{
    if(m.hs===null || m.as===null) return;
    const f = fichaOf(m.key);
    if(!f) return;
    [["sc0", m.home],["sc1", m.away]].forEach(([field, team])=>{
      if(team!=="ARG") return;
      parseScorers(f[field]).forEach(gl=>{
        const p = rows.find(r=>matchPlayer(gl.name, r.name));
        if(p) p.g += gl.n;
      });
    });
    const eff = mvpFor(m.key, m.home, m.away);
    if(eff && (m.home==="ARG"||m.away==="ARG")){
      const p = rows.find(r=>matchPlayer(eff.name, r.name));
      if(p) p.f++;
    }
  });
  return rows;
}

function argCampaign(){
  const out = {pj:0,w:0,d:0,l:0,gf:0,gc:0,y:0,r:0};
  allMatches().forEach(m=>{
    const isH = m.home==="ARG", isA = m.away==="ARG";
    if(!isH && !isA) return;
    if(m.hs===null || m.as===null) return;
    const f = fichaOf(m.key);
    if(f){ out.y += val(isH?f.y0:f.y1)||0; out.r += val(isH?f.r0:f.r1)||0; }
    out.pj++;
    const gf = isH?m.hs:m.as, gc = isH?m.as:m.hs;
    out.gf+=gf; out.gc+=gc;
    if(gf>gc) out.w++;
    else if(gf<gc) out.l++;
    else {
      if(m.ko){ const w = koWinner(m.ko); if(w && w.win==="ARG") out.w++; else if(w) out.l++; else out.d++; }
      else out.d++;
    }
  });
  return out;
}

/* fecha ART → Date (ART = UTC−3) */
function artDate(d, h){
  const dm = d.split("/").map(Number);
  const hm = h.split(":").map(Number);
  return new Date(Date.UTC(2026, dm[1]-1, dm[0], hm[0]+3, hm[1]));
}

/* hora local del dispositivo — cada visitante ve los horarios en su zona */
function locParts(d, h){
  const dt = artDate(d, h);
  const loc = {es:"es-AR", en:"en-GB", fr:"fr-FR", ja:"ja-JP"}[LANG] || "en-GB";
  const ds = new Intl.DateTimeFormat(loc, {day:"numeric", month:"numeric"}).format(dt);
  const hs = new Intl.DateTimeFormat(loc, {hour:"2-digit", minute:"2-digit", hour12:false}).format(dt);
  let wd = new Intl.DateTimeFormat(loc, {weekday:"short"}).format(dt).replace(".","");
  wd = wd.charAt(0).toUpperCase()+wd.slice(1);
  return {d:ds, h:hs, wd, dt};
}

function argMatchList(){
  const out = [];
  GM.forEach((m,i)=>{
    if(m[4]!=="ARG" && m[5]!=="ARG") return;
    const s = state.g[i] || null;
    out.push({key:"g:"+i, idx:i, tag:(L().group)+" J", home:m[4], away:m[5],
      hs:s?val(s[0]):null, as:s?val(s[1]):null, d:m[1], h:m[2], v:m[3], date:artDate(m[1],m[2])});
  });
  const labels = L().roundsS;
  KO.forEach(m=>{
    const t = koTeams(m);
    if(t.a.code!=="ARG" && t.b.code!=="ARG") return;
    const s = state.k[m.id] || null;
    out.push({key:"k:"+m.id, ko:m, tag:labels[m.r]+" · "+m.id, home:t.a.code, away:t.b.code,
      hs:s?val(s[0]):null, as:s?val(s[1]):null, d:m.d, h:m.h, v:m.v, date:artDate(m.d,m.h)});
  });
  out.sort((a,b)=>a.date-b.date);
  return out;
}

/* chips de tarjetas: el contador ES el dato — tocá +1, la − resta */
function chips(key, i, code){
  if(!code) return '<span></span>';
  const y = val(fichaVal(key,"y"+i))||0, r = val(fichaVal(key,"r"+i))||0;
  const hint = L().chipHint;
  const minus = '<span class="cx" aria-label="−1">−</span>';
  return '<span class="chipset">' +
    '<span class="chiplab" title="'+esc(tshort(code))+'">'+T[code][2]+'<b>'+esc(code)+'</b></span>' +
    '<button class="card-chip'+(y?'':' off')+'" data-ck="'+key+'" data-cf="y'+i+'" title="'+hint+'" aria-label="🟨 '+esc(tshort(code))+': '+y+'">🟨 '+y+(y?minus:'')+'</button>' +

}

function scSerialize(rows){
  return rows.filter(r=>r.n>0).map(r=> r.n>1 ? r.name+" x"+r.n : r.name).join(", ");
}

function scoreForKey(key){
  const bag = key[0]==="g" ? state.g : state.k;
  const s = bag[key.slice(2)];
  return s ? [val(s[0]), val(s[1])] : [null, null];
}

function addScorer(key, field, raw){
  const adds = parseScorers(raw);
  if(!adds.length) return;
  const rows = parseScorers(fichaVal(key, field));
  adds.forEach(a=>{
    const r = rows.find(x=>x.name.toLowerCase()===a.name.toLowerCase());
    if(r) r.n = Math.min(9, r.n + a.n); else rows.push(a);
  });
  setFicha(key, field, scSerialize(rows));
  save(); renderAll();
}

/* figura del partido automática: goleador del ganador (o del partido) */
function matchTopScorer(key, homeCode, awayCode){
  const f = fichaOf(key);
  if(!f) return null;
  const sc = scoreForKey(key);
  if(sc[0]===null || sc[1]===null) return null;
  let winSide = sc[0]>sc[1] ? 0 : sc[1]>sc[0] ? 1 : -1;
  if(winSide<0 && key[0]==="k"){
    const w = koWinner(KO_BY_ID[Number(key.slice(2))]);
    if(w) winSide = (w.win===homeCode) ? 0 : (w.win===awayCode ? 1 : -1);
  }
  const top = rows => rows.slice().sort((a,b)=> b.n-a.n)[0] || null;
  const best = (winSide>=0 && top(parseScorers(f["sc"+winSide]))) ||
               top(parseScorers(f.sc0).concat(parseScorers(f.sc1)));
  return best ? best.name : null;
}
function mvpFor(key, homeCode, awayCode){
  const manual = fichaVal(key, "mvp");
  if(manual) return { name: manual, auto: false };
  const auto = matchTopScorer(key, homeCode, awayCode);
  return auto ? { name: auto, auto: true } : null;
}

function fichaPanel(key, homeCode, awayCode){
  if(!openFichas.has(key)) return "";
  const l = L();
  const sc = scoreForKey(key);
  const inj = state.inj || {};
  const avail = SQUAD_AZ.filter(p=> !(p[0] in inj));
  let html = '<div class="ficha">';
  [homeCode, awayCode].forEach((code, i)=>{
    if(!code) return;
    const field = "sc"+i;
    const rows = parseScorers(fichaVal(key, field));
    const entered = rows.reduce((s,r)=>s+r.n, 0);
    /* contador ⚽ anotados/goles: verde si cierra, dorado si falta o sobra */
    const cnt = (sc[i]!==null)
      ? ' <span class="gcount'+(entered===sc[i]?' ok':' warn')+'" title="⚽ '+entered+' / '+sc[i]+'">'+entered+'/'+sc[i]+'</span>'
      : '';
    const gchips = rows.map(g=>
      '<button class="gchip" data-gk="'+key+'" data-gf="'+field+'" data-name="'+esc(g.name)+'" title="'+l.chipHint+'">⚽ '+esc(g.name)+(g.n>1?' <b>x'+g.n+'</b>':'')+'<span class="gx" aria-label="−1">✕</span></button>'
    ).join("");
    html += '<div class="fteam">'+T[code][2]+' '+esc(tshort(code))+' — '+l.fGoles+cnt+'</div>';
    if(gchips) html += '<div class="gchips">'+gchips+'</div>';
    if(code==="ARG"){
      const scOpts = avail.map(p=>'<option value="'+esc(p[0])+'">'+esc(p[0])+' · '+p[2]+'</option>').join("");
      html += '<select class="sq sc-add" data-gk="'+key+'" data-gf="'+field+'" aria-label="'+l.fGoles+'">' +
        '<option value="">'+l.scAdd+'</option>'+scOpts+'</select>';
    } else {
      html += '<div class="scrow">' +
        '<input class="sc-txt" type="text" maxlength="48" data-gk="'+key+'" data-gf="'+field+'" placeholder="'+l.scAddTxt+'" aria-label="'+l.fGoles+' '+esc(tshort(code))+'">' +
        '<button type="button" data-scaddbtn aria-label="'+l.scAddBtn+'">＋</button></div>';
    }
    /* tarjetas del equipo, acá mismo en la ficha */
    html += '<div class="fcards">'+chips(key, i, code)+'</div>';
  });
  if(!homeCode && !awayCode){
    html += '<div class="ftbd">'+l.fichaTbd+'</div></div>';
    return html;
  }
  const autoName = matchTopScorer(key, homeCode, awayCode);
  if(homeCode==="ARG" || awayCode==="ARG"){
    const mvp = fichaVal(key,"mvp");
    const mvpOpts = '<option value="">'+(autoName ? l.mvpAuto+esc(autoName) : l.mvpNone)+'</option>' +
      avail.map(p=>'<option value="'+esc(p[0])+'"'+(mvp===p[0]?" selected":"")+'>'+esc(p[0])+' · '+p[2]+'</option>').join("") +
      (mvp && !avail.some(p=>p[0]===mvp) ? '<option value="'+esc(mvp)+'" selected>'+esc(mvp)+'</option>' : '');
    const stars = [1,2,3,4,5].map(n=>
      '<button class="star-btn'+((fichaVal(key,"st")||0)>=n?" on":"")+'" data-star="'+key+'" data-n="'+n+'" aria-label="'+n+'★">★</button>').join("");
    html += '<div class="fwide">' +
      '<select class="sq" data-fk="'+key+'" data-ff="mvp" aria-label="'+l.fFig+'" style="margin-bottom:0">'+mvpOpts+'</select>' +
      '<span class="stars" title="'+l.fStars+'">'+stars+'</span>' +
    '</div>';
  } else {
    html += '<div class="fwide"><input class="sq" type="text" maxlength="48" data-fk="'+key+'" data-ff="mvp" value="'+esc(fichaVal(key,"mvp"))+'" placeholder="'+(autoName ? l.mvpAuto+esc(autoName) : l.fFigPh)+'" aria-label="'+l.fFig+'"></div>';
  }
  const eff = mvpFor(key, homeCode, awayCode);
  if(eff) html += '<div class="mvpline">'+l.fFig+': <b>'+esc(eff.name)+'</b>'+(eff.auto ? ' <span class="autotag">auto</span>' : '')+'</div>';
  html += '</div>';
  return html;
}

function thirdOptions(m){
  const l = L();
  const chosen = state.third[m.id] || "";
  const usedElsewhere = new Set();
  KO.forEach(x=>{ if(x.id!==m.id && state.third[x.id]) usedElsewhere.add(state.third[x.id]); });
  const rec = [], other = [];
  for(const g in GROUPS){
    const st = groupStandings(g);
    if(!st.complete) continue;
    const c = st.list[2].c;
    if(usedElsewhere.has(c)) continue;
    (m.b.gs.includes(g) ? rec : other).push({g, c});
  }
  let html = '<select class="third" data-key="'+m.id+'"><option value="">'+l.pickThird+'</option>';
  if(rec.length){
    html += '<optgroup label="'+l.sug+m.b.gs.join("/")+')">';
    rec.forEach(o=> html += '<option value="'+o.c+'" '+(o.c===chosen?"selected":"")+'>3° '+o.g+' — '+esc(tshort(o.c))+'</option>');
    html += '</optgroup>';
  }
  if(other.length){
    html += '<optgroup label="'+l.oth+'">';
    other.forEach(o=> html += '<option value="'+o.c+'" '+(o.c===chosen?"selected":"")+'>3° '+o.g+' — '+esc(tshort(o.c))+'</option>');
    html += '</optgroup>';
  }
  if(chosen && ![].concat(rec,other).some(o=>o.c===chosen)){
    html += '<option value="'+chosen+'" selected>'+esc(tshort(chosen))+'</option>';
  }
  html += '</select>';
  return html;
}

function koCard(m, opts){
  const l = L();
  const t = koTeams(m);
  const s = state.k[m.id] || ["",""];
  const w = koWinner(m);
  const key = "k:"+m.id;
  const drawNeedsPen = t.a.code && t.b.code && val(s[0])!==null && val(s[1])!==null && val(s[0])===val(s[1]);
  const isArgMatch = t.a.code==="ARG" || t.b.code==="ARG";
  let html = '<div class="kcard'+(opts&&opts.final?" final-card":"")+(w?" live-gold":"")+'" data-mid="'+m.id+'">' +
    '<div class="knum"><span><b>'+m.id+'</b> · '+(lp=>lp.wd+' '+lp.d+' · '+lp.h+l.hs)(locParts(m.d,m.h))+'</span><span>'+(isArgMatch?ftChip(key,m.d,m.h,val(s[0])!==null&&val(s[1])!==null):"")+fichaBtn(key)+'</span></div>' +
    '<div class="kvenue">'+esc(ven(m.v))+'</div>';
  const noScore = val(s[0])===null && val(s[1])===null;
  [["a",0],["b",1]].forEach(([side,idx])=>{
    const slot = t[side];
    let cls = "";
    if(w && slot.code){ cls = (w.win===slot.code) ? " winner" : " loser"; }
    let inner, badge = "";
    if(slot.code){
      inner = tlabel(slot.code);
      if(slot.conf && noScore) badge = ' <span class="slotb ok" title="'+l.confT+'">✓ '+l.confB+'</span>';
    } else if(slot.proj){
      inner = '<span class="projname" title="'+esc(slot.label)+'">'+tlabel(slot.proj)+'</span>';
      badge = ' <span class="slotb pend">'+l.pendB+'</span>';
    } else {
      inner = esc(slot.label);
    }
    html += '<div class="kteam'+cls+'">' +
      '<span class="tname'+(slot.code?"":" tbd")+'">'+inner+badge+'</span>' +
      scoreInput("k", m.id, idx, val(s[idx])) + '</div>';
  });
  if(t.a.code || t.b.code){
    html += '<div class="kcards stack">'+chips(key,0,t.a.code)+chips(key,1,t.b.code)+'</div>';
  }
  if(m.b.t==="third") html += thirdOptions(m);
  if(drawNeedsPen){
    const p = state.pen[m.id];
    html += '<div class="pen">'+l.pen +
      '<div class="pen-row">' +
      '<button class="pen-btn'+(p==="a"?" sel":"")+'" data-pen="'+m.id+'" data-side="a">'+esc(tshort(t.a.code))+'</button>' +
      '<button class="pen-btn'+(p==="b"?" sel":"")+'" data-pen="'+m.id+'" data-side="b">'+esc(tshort(t.b.code))+'</button>' +
      '</div></div>';
  }
  html += fichaPanel(key, t.a.code, t.b.code);
  html += '</div>';
  return html;
}

const collapsedRounds = new Set();

function renderBracket(){
  const l = L();
  /* banners clickeables: plegá una ronda para ver mejor el resto del cuadro */
  const banner = (r, label) => {
    const c = collapsedRounds.has(r);
    return '<button class="round-banner'+(c?" collapsed":"")+'" data-round="'+r+'" title="'+esc(label)+'" aria-expanded="'+(!c)+'">' +
      '<span class="caret">'+(c?"▸":"▾")+'</span><span class="mini">🏆</span><span class="label">'+label+'</span></button>';
  };
  $("#bracket-head").innerHTML =
    banner("r32", l.rounds.r32) +
    banner("r16", l.rounds.r16) +
    banner("qf", l.rounds.qf) +
    banner("sf", l.rounds.sf) +
    '<div class="round-banner red">'+l.rounds.f+'</div>';

  const small = window.matchMedia && window.matchMedia("(max-width:540px)").matches;
  const colW = r => collapsedRounds.has(r) ? "42px" : (small ? "230px" : "258px");
  const template = [colW("r32"),colW("r16"),colW("qf"),colW("sf"), small?"262px":"288px"].join(" ");
  $("#bracket-head").style.gridTemplateColumns = template;
  $("#bracket-grid").style.gridTemplateColumns = template;

  /* escala vertical adaptativa: la ronda visible más temprana define la grilla,
     así plegar rondas terminadas también achica la altura */
  const span0 = {r32:2, r16:4, qf:8, sf:16};
  const col   = {r32:1, r16:2, qf:3, sf:4};
  const firstVis = ["r32","r16","qf","sf"].find(r=>!collapsedRounds.has(r));
  const fscale = firstVis ? 2/span0[firstVis] : 0;
  const totalRows = firstVis ? Math.round(32*fscale) : 4;
  const span = {};
  for(const r in span0) span[r] = Math.max(1, Math.round(span0[r]*fscale));
  let html = "";
  ["r32","r16","qf","sf"].forEach(r=>{
    if(collapsedRounds.has(r)) return;
    LAYOUT[r].forEach((id,i)=>{
      html += '<div class="slot" style="grid-column:'+col[r]+';grid-row:'+(i*span[r]+1)+' / span '+span[r]+'">' +
        koCard(KO_BY_ID[id]) + '</div>';
    });
  });
  const final = KO_BY_ID[104], third = KO_BY_ID[103];
  const w = koWinner(final);
  html += '<div class="final-col" style="grid-column:5;grid-row:1 / span '+totalRows+'">' +
    koCard(final, {final:true}) +
    '<div class="round-banner goldb"><span class="mini">🏆</span>'+l.champ+'</div>' +
    '<div class="champion'+(w?" won":"")+'">' +
      '<span class="cup">'+trophyIMG()+'</span>' +
      '<div class="cplate"><div class="cname'+(w?"":" tbd")+'">'+(w ? esc(T[w.win][2]+" "+tshort(w.win)) : l.champTbd)+'</div></div>' +
    '</div>' +
    '<div class="col-divide"></div>' +
    '<div class="round-banner green">'+l.rounds.tp+'</div>' +
    koCard(third) +
  '</div>';
  $("#bracket-grid").innerHTML = html;
}

/* modo ajustar: escala el cuadro entero para que entre en la pantalla (ancho Y alto) */
function applyFit(){
  const wrap = $("#bracket"), scroll = $("#ko-scroll");
  if(!wrap || wrap.offsetParent===null) return;
  wrap.classList.toggle("fitted", koFit);
  if(!koFit){
    wrap.style.transform = "";
    scroll.style.height = "";
    scroll.style.overflowX = "";
    return;
  }
  wrap.style.transform = "";
  const availW = scroll.clientWidth - 4;
  const availH = Math.max(260, window.innerHeight - 96);
  const s = Math.min(1, availW / wrap.scrollWidth, availH / wrap.scrollHeight);
  wrap.style.transformOrigin = "top left";
  wrap.style.transform = "scale("+s+")";
  scroll.style.height = (wrap.scrollHeight * s + 12) + "px";
  scroll.style.overflowX = "hidden";
}

/* ----- estadísticas ----- */
function leaderCard(label, rows, pick, fmt){
  const played = rows.filter(r=>r.pj>0);
  if(!played.length) return '<div class="leader"><div class="ll">'+label+'</div><div class="lv" style="color:var(--muted)">—</div></div>';
  const best = pick(played);
  const tied = played.filter(r=>pick([r, best])===r && fmt(r)===fmt(best));
  const names = tied.slice(0,2).map(r=>esc(tname(r.c))).join(" · ") + (tied.length>2?" +"+(tied.length-2):"");
  return '<div class="leader"><div class="ll">'+label+'</div><div class="lv">'+names+'<small>'+fmt(best)+'</small></div></div>';
}

function lbPanel(title, note, list, fmtVal, barFn){
  let html = '<div class="lb"><div class="lb-t">'+title+(note?' <small>'+note+'</small>':'')+'</div>';
  if(!list.length){
    html += '<div class="lb-empty">'+L().noStats+'</div>';

    list.forEach((r,i)=>{

    });
  }
  return html + '</div>';
}

let statsTableOpen = false;

function renderStats(){
  const l = L();
  const rows = teamStats();
  const played = rows.filter(r=>r.pj>0);
  let html = "";

  /* leaderboards con barras: se leen como gráfico, no como planilla */
  html += '<div><h2 style="margin:0 0 8px;font-family:\'Saira Extra Condensed\';font-weight:800;font-size:1.5rem;letter-spacing:.06em;text-transform:uppercase">'+l.statsLeaders+'</h2>';
  html += '<div class="lb-grid">';

  const atk = played.slice().sort((a,b)=> b.gf-a.gf || a.gc-b.gc).slice(0,5);
  const maxGf = Math.max(1, ...atk.map(r=>r.gf));
  html += lbPanel(l.lbAtk, l.lbAtkN, atk, r=>r.gf,
    r=>'<i class="atk" style="width:'+(r.gf/maxGf*100).toFixed(0)+'%"></i>');


  const def = played.filter(r=>r.pj>=2).sort((a,b)=> a.gc-b.gc || b.gf-a.gf).slice(0,5);
  const maxGc = Math.max(1, ...def.map(r=>r.gc));
  html += lbPanel(l.lbDef, l.lbDefN, def, r=>r.gc,
    r=>'<i class="def" style="width:'+((maxGc+1-r.gc)/(maxGc+1)*100).toFixed(0)+'%"></i>');

  /* disciplina: barra apilada — el largo rankea (🟥 pesa x4), los segmentos muestran cuántas de cada una */
  const dis = rows.filter(r=>r.y>0 || r.r>0).sort((a,b)=> (b.y+4*b.r)-(a.y+4*a.r)).slice(0,5);
  const maxPen = Math.max(1, ...dis.map(r=>r.y+4*r.r));
  html += lbPanel(l.lbDis, l.lbDisN, dis,
    r=>'<span>🟨 '+r.y+'</span><span>🟥 '+r.r+'</span>',
    r=>{
      const w = (r.y + 4*r.r)/maxPen*100;
      const tot = r.y + r.r;
      const yw = (r.y/tot*w).toFixed(1), rw = (r.r/tot*w).toFixed(1);
      return '<i class="disy" style="width:'+yw+'%"></i><i class="disr" style="width:'+rw+'%"></i>';
    });

  html += '</div></div>';

  /* tabla completa, plegada por defecto */
  const cols = [["team",l.sTh.team],["pj",l.sTh.pj],["w",l.thG],["gf",l.sTh.gf],["gc",l.sTh.gc],["dg",l.sTh.dg],["y",l.sTh.y],["r",l.sTh.r],["fp",l.sTh.fp]];
  const sorted = rows.filter(r=>r.pj>0 || r.y>0 || r.r>0);
  sorted.sort((a,b)=>{
    const k = statsSort.key;
    if(k==="team") return statsSort.dir * tshort(a.c).localeCompare(tshort(b.c));
    return statsSort.dir * (a[k]-b[k]) || b.gf-a.gf;
  });
  html += '<details class="scard tbl-details" id="tbl-details"'+(statsTableOpen?' open':'')+'><summary>'+l.fullTable+'<small>'+l.statsTeamsSub+'</small></summary>';
  if(!sorted.length){
    html += '<div class="pad">'+l.noStats+'</div>';
  } else {
    html += '<div style="overflow-x:auto"><table class="stats"><thead><tr>';
    cols.forEach(([k,lab])=>{
      html += '<th class="'+(k==="team"?"team ":"")+(statsSort.key===k?"sorted":"")+'" data-sort="'+k+'">'+lab+(statsSort.key===k?(statsSort.dir<0?" ↓":" ↑"):"")+'</th>';
    });
    html += '</tr></thead><tbody>';
    sorted.forEach(r=>{
      html += '<tr'+(r.c==="ARG"?' class="arg-row"':'')+'><td class="team">'+tlabel(r.c)+(r.c==="ARG"?" ⭐⭐⭐":"")+'</td><td>'+r.pj+'</td><td>'+r.w+'</td><td>'+r.gf+'</td><td>'+r.gc+'</td><td>'+(r.dg>0?"+":"")+r.dg+'</td><td>'+r.y+'</td><td>'+r.r+'</td><td class="fp">'+r.fp+'</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</details>';

  /* premios: lo completás vos al final del torneo */
  const aw = state.awards || {};
  const boot = scorersTally();

  [["botin", sugBoot], ["balon",""], ["guante",""], ["joven",""], ["fairplay", fpBest? tshort(fpBest.c)+" ("+fpBest.fp+")":""]].forEach(([k, sug])=>{
    html += '<div class="award"><label>'+l.aw[k]+'</label>' +
      '<input type="text" data-award="'+k+'" placeholder="'+l.awPh+'" value="'+esc(aw[k]||"")+'">' +
      (sug && !aw[k] ? '<span class="hint">'+l.awSug+esc(sug)+'</span>' : '') +
    '</div>';
  });

  $("#stats-wrap").innerHTML = html;

}

/* ----- panel de equipo (clic en bandera) ----- */
function teamCardTotals(code){
  const out = {y:0, r:0};
  allMatches().forEach(m=>{
    if(m.hs===null || m.as===null) return;
    const f = fichaOf(m.key);
    if(!f) return;
    if(m.home===code){ out.y += val(f.y0)||0; out.r += val(f.r0)||0; }
    if(m.away===code){ out.y += val(f.y1)||0; out.r += val(f.r1)||0; }
  });
  return out;
}

function teamSummary(code){
  const out = {pj:0, w:0, d:0, l:0, gf:0, gc:0, rows:[]};
  allMatches().forEach(m=>{
    const isH = m.home===code, isA = m.away===code;
    if(!isH && !isA) return;
    if(m.hs===null || m.as===null) return;
    const rival = isH ? m.away : m.home;
    const gf = isH ? m.hs : m.as, gc = isH ? m.as : m.hs;
    out.pj++; out.gf += gf; out.gc += gc;
    let r = "d", pen = "";
    if(gf>gc) r = "w";
    else if(gf<gc) r = "l";
    else if(m.ko){
      const w = koWinner(m.ko);
      if(w){ r = (w.win===code) ? "w" : "l"; pen = " (pen)"; }
    }
    out[r]++;
    let tag;
    if(m.ko) tag = L().rounds[m.ko.r];
    else tag = L().group+" "+GM[Number(m.key.slice(2))][0];
    out.rows.push({tag, rival, gf, gc, r, pen, v:m.v, d:m.d, h:m.h});
  });
  return out;
}

/* ----- conectores SVG ----- */
function drawConnectors(){
  const svg = $("#bracket-svg");
  const wrap = $("#bracket");
  if(!wrap || wrap.offsetParent===null){ return; }
  /* medir sin escala para que las líneas queden en su lugar */
  const prevT = wrap.style.transform;
  wrap.style.transform = "";
  const br = wrap.getBoundingClientRect();
  svg.setAttribute("width", wrap.scrollWidth);
  svg.setAttribute("height", wrap.scrollHeight);
  let paths = "";
  KO.forEach(m=>{
    if(m.id===103) return;
    [m.a, m.b].forEach(s=>{
      if(s.t!=="win") return;
      const from = wrap.querySelector('[data-mid="'+s.m+'"]');
      const to   = wrap.querySelector('[data-mid="'+m.id+'"]');
      if(!from || !to) return;
      const f = from.getBoundingClientRect(), t = to.getBoundingClientRect();
      const x1 = f.right - br.left, x2 = t.left - br.left;
      const y1 = f.top + f.height/2 - br.top;
      const y2 = t.top + t.height/2 - br.top;
      const midX = (x1 + x2)/2;
      const advanced = koWinner(KO_BY_ID[s.m]) !== null;
      paths += '<path'+(advanced?' class="gold"':'')+' d="M'+x1.toFixed(1)+' '+y1.toFixed(1)+' H'+midX.toFixed(1)+' V'+y2.toFixed(1)+' H'+x2.toFixed(1)+'"/>';
    });
  });
  svg.innerHTML = paths;
  wrap.style.transform = prevT;
  applyFit();
}

function setTab(which){

/* ¿quién juega hoy? — tira global bajo las pestañas */
function todayMatches(){
  /* "hoy" según el reloj del dispositivo */
  const now = new Date();
  const sameDay = dt => dt.getDate()===now.getDate() && dt.getMonth()===now.getMonth();
  const out = [];
  GM.forEach((m,i)=>{
    const lp = locParts(m[1], m[2]);
    if(sameDay(lp.dt)){
      const s = state.g[i] || null;
      out.push({key:"g:"+i, a:m[4], b:m[5], la:null, lb:null,
        hs:s?val(s[0]):null, as:s?val(s[1]):null, h:lp.h, dt:lp.dt, v:m[3]});
    }
  });
  KO.forEach(m=>{
    const lp = locParts(m.d, m.h);
    if(sameDay(lp.dt)){
      const tt = koTeams(m);
      const s = state.k[m.id] || null;
      out.push({key:"k:"+m.id, a:tt.a.code, b:tt.b.code, la:tt.a.label, lb:tt.b.label,
        hs:s?val(s[0]):null, as:s?val(s[1]):null, h:lp.h, dt:lp.dt, v:m.v});
    }
  });
  out.sort((x,y)=> x.dt - y.dt);
  return out;
}
function renderToday(){
  const l = L();
  const ms = todayMatches();
  const strip = $("#today-strip");
  if(!ms.length){ strip.hidden = true; strip.innerHTML=""; return; }
  let html = '<span class="tlabel">'+l.todayT+'</span>';
  ms.forEach(m=>{
    const A = m.a ? T[m.a][2]+" "+m.a : esc(m.la||"—");
    const B = m.b ? m.b+" "+T[m.b][2] : esc(m.lb||"—");
    const mid = (m.hs!==null && m.as!==null)
      ? '<span class="tsc">'+m.hs+'–'+m.as+'</span>'
      : '<span class="tmeta">'+m.h+l.hs+'</span>';
    html += '<button class="tchip" data-goto="'+m.key+'">'+A+' '+mid+' '+B+' <span class="tmeta">· '+esc(ven(m.v))+'</span></button>';
  });
  strip.innerHTML = html;

}

/* ----- fuegos artificiales albicelestes: cada victoria argentina ----- */
const FX_COLORS = ["#75aadb","#ffffff","#f4c848","#e4b54a","#a8d2f0","#ffffff"];
let fxRunning = false;
function fireworks(duration, colors){
  const PAL = (colors && colors.length) ? colors : FX_COLORS;
  window.__fx = (window.__fx||0) + 1;
  const cv = $("#fx");
  let ctx = null;
  try{ ctx = cv.getContext && cv.getContext("2d"); }catch(e){}
  if(!ctx || fxRunning) return;
  fxRunning = true;
  cv.hidden = false;
  cv.width = window.innerWidth;
  cv.height = window.innerHeight;
  const parts = [];
  const end = performance.now() + duration;
  let lastLaunch = 0;
  function launch(){
    const x = cv.width*0.1 + Math.random()*cv.width*0.8;
    const y = cv.height*0.12 + Math.random()*cv.height*0.45;
    const col = PAL[Math.floor(Math.random()*PAL.length)];
    const n = 42 + Math.random()*30;
    for(let i=0;i<n;i++){
      const a = Math.PI*2*i/n + Math.random()*.25;
      const sp = 2 + Math.random()*3.6;
      parts.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, col, sz:1.8+Math.random()*2.2});
    }
  }
  function tick(now){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(now < end && now - lastLaunch > 270){
      launch();
      if(Math.random() < .45) launch();
      lastLaunch = now;
    }
    for(let i=parts.length-1;i>=0;i--){
      const p = parts[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += .045; p.vx *= .985; p.vy *= .985;
      p.life -= .012;
      if(p.life <= 0){ parts.splice(i,1); continue; }
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.sz*p.life + .6, 0, 7);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if(now < end || parts.length){ requestAnimationFrame(tick); }
    else { cv.hidden = true; fxRunning = false; }
  }
  requestAnimationFrame(tick);
}

/* ¿terminó el partido? — pasaron 2h30 del horario, o lo marcaste con 🏁 */
function matchEnded(key, d, h){
  if(state.ft[key]) return true;
  return Date.now() > artDate(d, h).getTime() + 150*60000;
}

/* chip 🏁 — aparece sólo si cargaste un resultado antes de que el reloj diga que terminó */
function ftChip(key, d, h, scored){
  if(!scored) return "";
  const autoOver = Date.now() > artDate(d, h).getTime() + 150*60000;
  if(autoOver) return "";
  const on = !!state.ft[key];
  const l = L();
  return '<button class="ft-chip'+(on?' on':'')+'" data-ft="'+key+'" title="'+l.ftTip+'">🏁 '+l.ft+'</button>';
}

let prevWins = null;
function finishedWins(){
  const map = {};
  allMatches().forEach(m=>{
    if(m.hs===null || m.as===null) return;
    if(!matchEnded(m.key, m.d, m.h)) return;  /* nada de festejar antes del pitazo */
    let win = null;
    if(m.ko){ const w = koWinner(m.ko); win = w ? w.win : null; }
    else if(m.hs>m.as) win = m.home;
    else if(m.as>m.hs) win = m.away;
    if(win) map[m.key] = { win, t: artDate(m.d, m.h).getTime() };
  });
  return map;
}
function checkFireworks(){
  const now = finishedWins();
  if(prevWins){
    const news = Object.keys(now).filter(k=> !prevWins[k] || prevWins[k].win !== now[k].win);
    if(news.length){
      /* si entran varios juntos (⟳ Resultados), festejamos sólo el más importante */
      const pick = news.includes("k:104") ? "k:104" : news.sort((a,b)=> now[b].t - now[a].t)[0];
      const code = now[pick].win;
      const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if(!reduce) fireworks(pick==="k:104" ? 9000 : 3600, TEAM_COLORS[code] || FX_COLORS);
    }
  }
  prevWins = now;
}

let chipTimer = null, chipLong = false;
function bumpChip(el, delta){
  const key = el.dataset.ck, field = el.dataset.cf;
  const cur = val(fichaVal(key, field)) || 0;
  const n = Math.max(0, Math.min(9, cur + delta));
  if(n === cur) return;
  setFicha(key, field, n===0 ? "" : n);
  save(); renderAll();
}
function bumpGoal(el, delta){
  const key = el.dataset.gk, field = el.dataset.gf, name = el.dataset.name;
  const rows = parseScorers(fichaVal(key, field));
  const r = rows.find(x=>x.name===name);
  if(!r) return;
  r.n = Math.min(9, r.n + delta);
  setFicha(key, field, scSerialize(rows));
  save(); renderAll();
}
function bumpAny(el, delta){
  if(el.classList.contains("gchip")) bumpGoal(el, delta);
  else bumpChip(el, delta);
}

const KEY_CFG = "mundial2026-cfg";
function loadCfg(){

  catch(e){ return d; }
}

function saveCfg(){ try{ localStorage.setItem(KEY_CFG, JSON.stringify(cfg)); }catch(e){} }
function sbUrl(){ return (cfg.url || CONFIG.SUPABASE_URL || "").replace(/\/+$/,""); }
function sbAnon(){ return cfg.anon || CONFIG.SUPABASE_ANON_KEY || ""; }
function fdKey(){ return cfg.fd || CONFIG.FOOTBALL_DATA_KEY || ""; }
function syncOn(){ return !!(sbUrl() && sbAnon() && cfg.sess && cfg.sess.rt); }

/* ---------- cuentas: magic link de Supabase, sin librerías ---------- */
function b64urlJson(s){
  try{ return JSON.parse(atob(s.replace(/-/g,"+").replace(/_/g,"/"))); }catch(e){ return null; }
}
function setSession(d){
  const claims = d.access_token ? b64urlJson(d.access_token.split(".")[1]) : null;
  cfg.sess = {
    at: d.access_token || "",
    rt: d.refresh_token || (cfg.sess && cfg.sess.rt) || "",
    exp: Date.now() + (Number(d.expires_in)||3600)*1000,
    email: (d.user && d.user.email) || (claims && claims.email) || (cfg.sess && cfg.sess.email) || "",
    uid: (d.user && d.user.id) || (claims && claims.sub) || (cfg.sess && cfg.sess.uid) || ""
  };
  saveCfg();
}
function clearSession(){ cfg.sess = null; cfg.last = ""; saveCfg(); }
function sessFresh(){ return cfg.sess && cfg.sess.at && Date.now() < (cfg.sess.exp||0) - 30000; }
let refreshing = null;
async function ensureSession(){
  if(!cfg.sess || !cfg.sess.rt) return false;
  if(sessFresh()) return true;
  if(!refreshing){
    refreshing = (async ()=>{
      try{
        const r = await fetch(sbUrl()+"/auth/v1/token?grant_type=refresh_token", {
          method:"POST",
          headers:{ apikey: sbAnon(), "Content-Type":"application/json" },
          body: JSON.stringify({ refresh_token: cfg.sess.rt })
        });
        if(!r.ok) throw 0;
        setSession(await r.json());
        return true;
      }catch(e){
        clearSession(); setSyncUi("off");
        return false;
      }finally{ refreshing = null; }
    })();
  }
  return refreshing;
}
async function sendMagicLink(email){
  const redirect = encodeURIComponent(location.origin + location.pathname);
  const r = await fetch(sbUrl()+"/auth/v1/otp?redirect_to="+redirect, {
    method:"POST",
    headers:{ apikey: sbAnon(), "Content-Type":"application/json" },
    body: JSON.stringify({ email: email, create_user: true })
  });
  if(!r.ok){
    let msg = "HTTP "+r.status;
    try{ const d = await r.json(); msg = d.msg || d.error_description || d.message || msg; }catch(e){}
    throw new Error(msg);
  }
}
/* al volver del mail, el token llega en el hash de la URL */
function handleAuthHash(){
  if(!location.hash || location.hash.indexOf("access_token=") < 0){
    if(location.hash && location.hash.indexOf("error_description=") >= 0){
      const q = new URLSearchParams(location.hash.slice(1));
      toast("⚠ " + decodeURIComponent(q.get("error_description")||"").replace(/\+/g," "));
      history.replaceState(null, "", location.pathname + location.search);
    }
    return false;
  }
  const q = new URLSearchParams(location.hash.slice(1));
  setSession({
    access_token: q.get("access_token"),
    refresh_token: q.get("refresh_token"),
    expires_in: q.get("expires_in")
  });
  history.replaceState(null, "", location.pathname + location.search);
  return true;
}
function sbHeaders(json){
  const h = { "apikey": sbAnon(), "Authorization": "Bearer "+sbAnon() };
  if(json){ h["Content-Type"] = "application/json"; h["Prefer"] = "resolution=merge-duplicates,return=minimal"; }
  return h;
}

let syncTimer = null, syncUiState = "off";
function setSyncUi(st){
  syncUiState = st;
  const b = $("#btn-sync"); if(!b) return;
  const ic = st==="ok" ? "☁✓" : st==="saving" ? "☁…" : st==="err" ? "☁⚠" : "☁";
  const who = syncOn() && cfg.sess.email ? cfg.sess.email.split("@")[0] : L().syncBtn;
