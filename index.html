/* push con debounce: 1.2s después del último cambio */
function schedulePush(){
  if(!syncOn()) return;
  clearTimeout(syncTimer);
  setSyncUi("saving");
  syncTimer = setTimeout(pushState, 1200);
}
async function pushState(){
  syncTimer = null;
  if(!syncOn()) return;
  if(!(await ensureSession())) return;
  const now = new Date().toISOString();
  try{
    const h = sbHeaders(true);
    h["Authorization"] = "Bearer " + cfg.sess.at;
    const r = await fetch(sbUrl()+"/rest/v1/brackets", {
      method: "POST", headers: h,
      body: JSON.stringify({ user_id: cfg.sess.uid, state: state, updated_at: now })
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    cfg.last = now; saveCfg();
    setSyncUi("ok");
  }catch(e){ setSyncUi("err"); }
}
async function pullState(){
  if(!syncOn()) return;
  if(syncTimer) return;  /* hay cambios locales por subir: local manda */
  if(!(await ensureSession())) return;
  try{
    const h = sbHeaders(false);
    h["Authorization"] = "Bearer " + cfg.sess.at;
    const r = await fetch(sbUrl()+"/rest/v1/brackets?user_id=eq."+encodeURIComponent(cfg.sess.uid)+"&select=state,updated_at",
      { headers: h });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows = await r.json();
    if(rows.length){
      const row = rows[0];
      if(row.updated_at !== cfg.last && row.state){
        state = Object.assign(defaultState(), row.state);
        LANG = ["en","fr","ja"].indexOf(state.lang)>=0 ? state.lang : "es";
        memState = state;
        try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
        cfg.last = row.updated_at; saveCfg();
        renderAll();
      }
      setSyncUi("ok");
    } else {
      pushState();  /* primera vez con este nombre: sembrar la nube */
    }
  }catch(e){ setSyncUi("err"); }
}

/* ================= RESULTADOS OFICIALES (football-data.org) ================= */

/* nombres de la API que no coinciden con los códigos FIFA de T */
const FD_ALIAS = {
  "korea republic":"KOR", "south korea":"KOR", "czech republic":"CZE", "czechia":"CZE",
  "turkiye":"TUR", "turkey":"TUR", "cote divoire":"CIV", "ivory coast":"CIV",
  "ir iran":"IRN", "iran":"IRN", "congo dr":"COD", "dr congo":"COD",
  "cabo verde":"CPV", "cape verde":"CPV", "cape verde islands":"CPV",
  "bosnia and herzegovina":"BIH", "bosniaherzegovina":"BIH", "curacao":"CUW",
  "saudi arabia":"KSA", "united states":"USA", "usa":"USA", "netherlands":"NED",
  "new zealand":"NZL", "south africa":"RSA"
};
function normName(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();
}
function codeFromApi(team){
  if(!team || (!team.name && !team.tla)) return null;
  if(team.tla && T[team.tla]) return team.tla;
  const n = normName(team.name);
  if(!n) return null;
  if(FD_ALIAS[n]) return FD_ALIAS[n];
  for(const c in T){ if(normName(T[c][1])===n || normName(T[c][0])===n) return c; }
  for(const c in T){ const en = normName(T[c][1]); if(en && (n.includes(en) || en.includes(n))) return c; }
  return null;
}

let toastTimer = null;
function toast(msg){
  let el = $("#toast");
  if(!el){ el = document.createElement("div"); el.id = "toast"; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove("show"), 4000);
}

/* pedir los partidos: directo, y si el navegador lo bloquea (CORS), por el relay en Supabase */
async function fetchFixtures(){
  try{
    return await fetch("https://api.football-data.org/v4/competitions/WC/matches",
      { headers: { "X-Auth-Token": fdKey() } });
  }catch(e){
    if(!(sbUrl() && sbAnon())) throw e;
    const h = { "apikey": sbAnon(), "x-fd-key": fdKey() };
    if(cfg.sess && cfg.sess.rt && (await ensureSession())) h["Authorization"] = "Bearer " + cfg.sess.at;
    /* probamos los nombres posibles del relay — cada intento aislado,
       porque un slug inexistente hace que el navegador tire error en vez de 404 */
    async function tryRelay(name){
      try{
        const r = await fetch(sbUrl()+"/functions/v1/"+name, { headers: h });
        return (r && r.status !== 404) ? r : null;
      }catch(err){ return null; }
    }
    let r2 = await tryRelay("smart-processor");
    if(!r2) r2 = await tryRelay("fd-proxy");
    if(!r2) throw { msg: L().updProxy };
    if(r2.status===401) throw { msg: L().updJwt };
    r2.viaRelay = true;
    return r2;
  }
}

async function autoUpdate(silent){
  const l = L();
  if(!fdKey()){ if(silent) return; toast(l.updNoKey); openSyncPop(); return; }
  const b = $("#btn-update");
  if(b){ b.disabled = true; b.textContent = "⟳ …"; }
  try{
    const r = await fetchFixtures();
    if(r.status===400 || r.status===401 || r.status===403) throw {msg:l.updBadKey};
    if(r.status===429) throw {msg:l.updRate};
    if(!r.ok) throw {msg:"HTTP "+r.status};
    const data = await r.json();
    if(!data || !Array.isArray(data.matches)){
      if(r.viaRelay) throw { msg: l.updProxyCode };
      throw { msg: "HTTP " + r.status };
    }

    /* índices por hora de inicio (instante UTC) */
    const gByT = {}, kByT = {};
    GM.forEach((m,i)=>{ const t = artDate(m[1],m[2]).getTime(); (gByT[t] = gByT[t]||[]).push(i); });
    KO.forEach(m=>{ const t = artDate(m.d,m.h).getTime(); (kByT[t] = kByT[t]||[]).push(m.id); });

    let nScores = 0, nThirds = 0;
    /* en orden cronológico: los grupos oficiales resuelven solos los cruces */
    const ms = (data.matches||[]).slice().sort((a,b)=> Date.parse(a.utcDate)-Date.parse(b.utcDate));
    ms.forEach(am=>{
      const t = Date.parse(am.utcDate);
      const hc = codeFromApi(am.homeTeam), ac = codeFromApi(am.awayTeam);
      const done = am.status==="FINISHED" && am.score && am.score.fullTime &&
        am.score.fullTime.home!==null && am.score.fullTime.away!==null;

      if(am.stage==="GROUP_STAGE"){
        const cand = gByT[t]||[];
        let idx = -1;
        if(cand.length===1) idx = cand[0];
        else {
          const f = cand.find(i=> (GM[i][4]===hc && GM[i][5]===ac) || (GM[i][4]===ac && GM[i][5]===hc));
          if(f!==undefined) idx = f;
        }
        if(idx<0 || !done) return;
        const flip = (ac && GM[idx][4]===ac);   /* la API tiene local/visitante al revés que nuestro fixture */
        const H = String(flip ? am.score.fullTime.away : am.score.fullTime.home);
        const A = String(flip ? am.score.fullTime.home : am.score.fullTime.away);
        const cur = state.g[idx];
        if(!cur || cur[0]!==H || cur[1]!==A){ state.g[idx] = [H, A]; nScores++; }
        state.ft["g:"+idx] = true;
        return;
      }

      /* eliminatorias */
      const cand = kByT[t]||[];
      let id = -1;
      if(cand.length===1) id = cand[0];
      else {
        const f = cand.find(cid=>{
          const tt = koTeams(KO_BY_ID[cid]);
          return (tt.a.code===hc && tt.b.code===ac) || (tt.a.code===ac && tt.b.code===hc);
        });
        if(f!==undefined) id = f;
      }
      if(id<0) return;
      const m = KO_BY_ID[id];
      /* la FIFA ya definió el cruce: asignar el tercero automáticamente */
      if(m.b.t==="third" && ac && T[ac] && state.third[id]!==ac){ state.third[id] = ac; nThirds++; }
      if(!done) return;
      /* ¿la API tiene el local/visitante al revés que nuestro fixture?
         Si no podemos resolver los equipos todavía, confiamos en el orden oficial. */
      const tt = koTeams(m);
      let flip = false;
      if(ac && tt.a.code===ac) flip = true;
      else if(hc && tt.b.code===hc) flip = true;
      let H = am.score.fullTime.home, A = am.score.fullTime.away;
      if(flip){ const x = H; H = A; A = x; }
      const cur = state.k[id];
      if(!cur || cur[0]!==String(H) || cur[1]!==String(A)){ state.k[id] = [String(H), String(A)]; nScores++; }
      if(H===A && am.score.winner && am.score.winner!=="DRAW"){
        const homeWins = am.score.winner==="HOME_TEAM";
        state.pen[id] = homeWins ? (flip ? "b" : "a") : (flip ? "a" : "b");
      }
      state.ft["k:"+id] = true;
    });

    save(); renderAll();
    if(nScores || nThirds) toast(l.updDone(nScores, nThirds));
    else if(!silent) alert(l.updNone);
  }catch(e){
    console.error("autoUpdate:", e);
    if(!silent){
      let detail;
      if(e && e.msg) detail = e.msg;
      else if(navigator.onLine===false) detail = "offline";
      else detail = l.updNet;
      const msg = l.updErr + detail;
      toast(msg);
      alert(msg);   /* imposible de no ver — sólo en actualización manual */
    }
  }finally{
    if(b){ b.disabled = false; b.textContent = L().updBtn; }
  }
}
